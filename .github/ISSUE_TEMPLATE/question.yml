name: Usage question
description: Pregunta de uso, integración o interpretación de resultados.
title: "[Question] "
labels: ["question"]
body:
  - type: textarea
    id: question
    attributes:
      label: Pregunta
      placeholder: ¿Qué necesitas entender exactamente?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Contexto
      description: Comando usado, output y objetivo.
      placeholder: |
        Comando:
        Output:
        Objetivo:
    validations:
      required: true
